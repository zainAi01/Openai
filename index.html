<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Pro - Your Advanced AI Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            font-family: 'Inter', sans-serif;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .message-bubble {
            max-width: 80%;
            margin: 8px 0;
            padding: 16px 20px;
            border-radius: 20px;
            position: relative;
        }
        
        .user-message {
            margin-left: auto;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .ai-message {
            background: rgba(255, 255, 255, 0.9);
            color: #1f2937;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }
        
        .typing-indicator {
            display: inline-flex;
            align-items: center;
        }
        
        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin: 0 2px;
            background: #667eea;
            animation: typing 1.4s infinite;
        }
        
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typing {
            0%, 60%, 100% { transform: scale(1); opacity: 0.4; }
            30% { transform: scale(1.2); opacity: 1; }
        }
        
        .glow {
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body class="min-h-screen gradient-bg overflow-hidden">
    <!-- Animated Background -->
    <div id="bg-animation" class="fixed inset-0 z-0 opacity-30"></div>
    
    <!-- Main Container -->
    <div class="relative z-10 flex flex-col h-screen max-w-6xl mx-auto">
        <!-- Header -->
        <header class="glass p-6 sticky top-0 z-20 backdrop-blur-md">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="w-12 h-12 bg-white/20 rounded-2xl flex items-center justify-center glow">
                        <i class="fas fa-brain text-white text-xl"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold text-white">AI Chat Pro</h1>
                        <p class="text-white/70 text-sm">Advanced AI Assistant</p>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <button id="theme-toggle" class="p-2 text-white/70 hover:text-white transition-all">
                        <i class="fas fa-moon"></i>
                    </button>
                    <button class="px-6 py-2 bg-white/20 backdrop-blur-sm rounded-xl text-white font-medium hover:bg-white/30 transition-all">
                        Upgrade to Pro
                    </button>
                </div>
            </div>
        </header>

        <!-- Chat Container -->
        <div class="flex-1 flex overflow-hidden">
            <!-- Sidebar -->
            <div class="w-80 glass border-r border-white/20 p-6 hidden lg:block">
                <div class="space-y-4">
                    <div class="flex items-center space-x-3 p-3 bg-white/10 rounded-xl">
                        <i class="fas fa-history text-white/80"></i>
                        <span class="text-white font-medium">New Chat</span>
                    </div>
                    
                    <div class="space-y-2">
                        <h3 class="text-white/80 font-semibold text-sm uppercase tracking-wide">Recent Chats</h3>
                        <div id="chat-history" class="space-y-2 max-h-96 overflow-y-auto">
                            <!-- Chat history items will be populated here -->
                        </div>
                    </div>
                    
                    <div class="pt-4 border-t border-white/20">
                        <div class="flex items-center space-x-3 p-3 bg-white/10 rounded-xl cursor-pointer hover:bg-white/20">
                            <i class="fas fa-cog text-white/80"></i>
                            <span class="text-white font-medium">Settings</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Main Chat Area -->
            <div class="flex-1 flex flex-col">
                <!-- Messages Container -->
                <div id="messages-container" class="flex-1 overflow-y-auto p-8 space-y-6 scrollbar-thin scrollbar-thumb-white/20 scrollbar-track-transparent">
                    <!-- Welcome Message -->
                    <div class="text-center py-20">
                        <div class="w-24 h-24 mx-auto mb-6 bg-white/20 rounded-3xl flex items-center justify-center glow">
                            <i class="fas fa-robot text-3xl text-white"></i>
                        </div>
                        <h2 class="text-3xl font-bold text-white mb-4">Welcome to AI Chat Pro</h2>
                        <p class="text-xl text-white/80 mb-8 max-w-md mx-auto">
                            Ask me anything. I'm here to help with coding, writing, analysis, and more.
                        </p>
                        <div class="flex flex-col sm:flex-row gap-4 justify-center">
                            <button onclick="generateSample()" class="px-8 py-4 bg-white/20 backdrop-blur-sm rounded-2xl text-white font-semibold hover:bg-white/30 transition-all glow">
                                Try: "Write a React component"
                            </button>
                            <button onclick="generateSample('Explain quantum computing')" class="px-8 py-4 border border-white/30 backdrop-blur-sm rounded-2xl text-white font-semibold hover:bg-white/20 transition-all">
                                Try: "Explain quantum computing"
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Input Area -->
                <div class="glass p-6 border-t border-white/20">
                    <div class="max-w-4xl mx-auto">
                        <div class="flex items-end space-x-4">
                            <div class="flex-1 relative">
                                <input 
                                    id="message-input"
                                    type="text" 
                                    placeholder="Message AI Chat Pro..."
                                    class="w-full p-4 pr-16 text-lg bg-white/10 backdrop-blur-sm border border-white/20 rounded-2xl text-white placeholder-white/60 focus:outline-none focus:border-white/50 focus:bg-white/20 transition-all resize-none"
                                    autocomplete="off"
                                >
                                <button id="send-file" class="absolute right-4 top-1/2 -translate-y-1/2 text-white/60 hover:text-white p-2 transition-all">
                                    <i class="fas fa-paperclip text-xl"></i>
                                </button>
                            </div>
                            <button 
                                id="send-button"
                                class="w-16 h-16 bg-gradient-to-r from-blue-500 to-purple-600 rounded-3xl flex items-center justify-center text-white glow hover:scale-105 transition-all shadow-2xl"
                            >
                                <i class="fas fa-arrow-up text-xl"></i>
                            </button>
                        </div>
                        <div class="flex items-center justify-center space-x-4 mt-4 text-xs text-white/60">
                            <span>Free</span>
                            <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
                            <span>AI Chat Pro is typing...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Global state
        let isTyping = false;
        let chatHistory = [];

        // Initialize
        document.addEventListener('DOMContentLoaded', init);

        function init() {
            setupEventListeners();
            createBackgroundAnimation();
            setupScrollBehavior();
        }

        function setupEventListeners() {
            const input = document.getElementById('message-input');
            const sendBtn = document.getElementById('send-button');
            const sendFileBtn = document.getElementById('send-file');

            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            sendBtn.addEventListener('click', sendMessage);
            sendFileBtn.addEventListener('click', () => {
                // File upload functionality
                alert('File upload feature coming soon!');
            });
        }

        async function sendMessage() {
            const input = document.getElementById('message-input');
            const message = input.value.trim();
            
            if (!message || isTyping) return;

            // Add user message
            addMessage(message, 'user');
            input.value = '';

            // Show typing indicator
            showTypingIndicator();

            // Simulate AI response with realistic delay
            await new Promise(resolve => setTimeout(resolve, 800 + Math.random() * 1200));

            // Generate AI response
            const aiResponse = await generateAIResponse(message);
            
            hideTypingIndicator();
            addMessage(aiResponse, 'ai');
        }

        function addMessage(content, sender) {
            const container = document.getElementById('messages-container');
            const welcome = container.querySelector('.text-center');
            
            if (welcome) {
                welcome.remove();
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `message-bubble ${sender === 'user' ? 'user-message' : 'ai-message'} ${sender === 'user' ? 'ml-auto' : ''}`;
            
            if (sender === 'ai') {
                messageDiv.innerHTML = `
                    <div class="flex items-start space-x-3">
                        <div class="w-8 h-8 bg-gradient-to-r from-blue-500 to-purple-600 rounded-2xl flex items-center justify-center flex-shrink-0 mt-1">
                            <i class="fas fa-robot text-white text-sm"></i>
                        </div>
                        <div class="flex-1 prose prose-invert max-w-none">
                            ${content.replace(/\n/g, '<br>')}
                        </div>
                    </div>
                `;
            } else {
                messageDiv.innerHTML = `
                    <div class="flex items-start justify-end">
                        <div class="prose prose-invert max-w-none">
                            ${content.replace(/\n/g, '<br>')}
                        </div>
                        <div class="w-8 h-8 bg-gradient-to-r from-gray-400 to-gray-500 rounded-2xl flex items-center justify-center flex-shrink-0 mt-1 ml-3">
                            <i class="fas fa-user text-white text-sm"></i>
                        </div>
                    </div>
                `;
            }

            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;

            // Add to chat history
            if (sender === 'user') {
                chatHistory.push({ user: content, ai: sender === 'ai' ? content : null });
                updateChatHistory();
            }
        }

        function showTypingIndicator() {
            isTyping = true;
            const container = document.getElementById('messages-container');
            
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message-bubble ai-message';
            typingDiv.innerHTML = `
                <div class="flex items-start space-x-3">
                    <div class="w-8 h-8 bg-gradient-to-r from-blue-500 to-purple-600 rounded-2xl flex items-center justify-center flex-shrink-0 mt-1">
                        <i class="fas fa-robot text-white text-sm"></i>
                    </div>
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <span class="ml-2 text-gray-500 font-medium">AI Chat Pro is typing...</span>
                    </div>
                </div>
            `;
            
            container.appendChild(typingDiv);
            container.scrollTop = container.scrollHeight;
        }

        function hideTypingIndicator() {
            isTyping = false;
            const typingIndicator = document.querySelector('.typing-indicator');
            if (typingIndicator) {
                typingIndicator.parentElement.parentElement.parentElement.remove();
            }
        }

        async function generateAIResponse(message) {
            // Mock AI responses - replace with real API integration
            const responses = {
                'react': `Here's a modern React component with hooks and Tailwind CSS:

\`\`\`jsx
import { useState, useEffect } from 'react';

const Counter = () => {
  const [count, setCount] = useState(0);

  return (
    <div className="p-8 bg-white rounded-2xl shadow-xl max-w-md mx-auto">
      <h2 className="text-3xl font-bold mb-6">Counter</h2>
      <div className="text-4xl font-mono font-bold mb-8 p-6 bg-gray-50 rounded-xl">
        {count}
      </div>
      <div className="flex gap-4">
        <button 
          onClick={() => setCount(c => c - 1)}

        >
          -

          onClick={() => setCount(0)}
          className="p-4 bg-gray-200 rounded-xl font-semibold hover:bg-gray-300 transition-all"
        >
          Reset
        </button>
        <button 
          onClick={() => setCount(c => c + 1)}
          className="flex-1 p-4 bg-blue-500 text-white rounded-xl font-semibold hover:bg-blue-600 transition-all"
        >
          +
        </button>
      </div>
    </div>
  );
};
\`\`\`

Want me to explain any part or add more features?`,
                
                'quantum': `## Quantum Computing Explained

**Classical vs Quantum Bits:**

                default: `Great question! Here's my analysis:

            };

            // Simulate API response selection
            const lowerMessage = message.toLowerCase();
            let response = responses.default;
            
            if (lowerMessage.includes('react') || lowerMessage.includes('component')) {
                response = responses.react;
            } else if (lowerMessage.includes('quantum')) {
                response = responses.quantum;
            }

            return response;
        }

        function generateSample(message = 'Write a modern React component') {
            document.getElementById('message-input').value = message;
            setTimeout(() => sendMessage(), 500);
        }

        function updateChatHistory() {
            const historyContainer = document.getElementById('chat-history');
            historyContainer.innerHTML = chatHistory.slice(-5).map((chat, index) => `
                <div class="p-3 rounded-xl cursor-pointer hover:bg-white/20 transition-all text-white text-sm truncate" onclick="loadChat(${chatHistory.length - 1 - index})">
                    ${chat.user.length > 50 ? chat.user.substring(0, 50) + '...' : chat.user}
                </div>
            `).join('');
        }

        function createBackgroundAnimation() {
            const canvas = document.createElement('canvas');
            canvas.id = 'bg-animation';
            document.getElementById('bg-animation').replaceWith(canvas);
            
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            let particles = [];
            for (let i = 0; i < 100; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5,
                    radius: Math.random() * 2 + 1
                });
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    
                    if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                    if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                    
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${0.
